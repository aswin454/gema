version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: campusone-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campusone-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/campusone
      - JWT_SECRET=campusone_ai_jwt_secret_secure_key_12984712
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - GEMMA_MODEL=gemma4:e2b
      - NODE_ENV=production
    depends_on:
      - mongodb
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./client
      
      dockerfile: Dockerfile
    container_name: campusone-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo-data:
